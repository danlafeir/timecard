name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux  GOARCH=amd64 go build -ldflags "-X 'main.BuildVersion=${{ github.ref_name }}'" -o dist/timecard-linux-amd64  ./main.go
          GOOS=linux  GOARCH=arm64 go build -ldflags "-X 'main.BuildVersion=${{ github.ref_name }}'" -o dist/timecard-linux-arm64  ./main.go
          GOOS=darwin GOARCH=amd64 go build -ldflags "-X 'main.BuildVersion=${{ github.ref_name }}'" -o dist/timecard-darwin-amd64 ./main.go
          GOOS=darwin GOARCH=arm64 go build -ldflags "-X 'main.BuildVersion=${{ github.ref_name }}'" -o dist/timecard-darwin-arm64 ./main.go

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=$(git tag -l --format='%(contents)' "${{ github.ref_name }}")
          gh release create "${{ github.ref_name }}" dist/* \
            --title "${{ github.ref_name }}" \
            --notes "$NOTES"
